<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Listas</title>
</head>
<body>
    <h1>Listas</h1>
    <hr>
    <p>Listas ordenadas</p>

    <ol type="a">
        <li>Colocar os ovos na batedeira</li>
        <li>Colocar o chocolate</li>
        <li>Colocar a farinha</li>
        <li>Colocar o açucar</li>
        <li>Colocar o leite</li>
    </ol>

    <p>Listas desordenadas</p>
    <ul>
        <li>Comprar café</li>
        <li>Comprar pão</li>
        <li>Produto de limpeza</li>
            <ol>
                <li>Sabonete</li>
                <li>Sabão</li>
                <li>Sabão em pó</li>
                <li>Detergente</li>
            </ol>
    </ul>
</body>
</html>
