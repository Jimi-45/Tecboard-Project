<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação</title>
</head>
<body>
    <h1>Formatações</h1>
    <hr>
    <p>Este é um testo em <b>negrito</b> usando uma tag não semântica</p>
    <p>Este é um testo em <strong>negrito</strong>  usando uma tag semântica</p>
    <p>Este é um testo usando <i>ênfase</i> uma tag não semântica</p>
    <p>Este é um testo usando <em>ênfase</em> uma tag semântica</p>
    <p>Minha casa tem 80m<sup>2</sup></p>
    <p>A composição química da água é H<sub>2</sub>O</p>

</body>
</html>
